name: Better Jukebox
version: 1.4.6.14
description : |
  BetterJukebox v1.4.6.14 - Settings Companion Status Style Match

  - Renames Standard theme to DiscoGrey
  - Keeps DiscoPurple as the default BetterJukebox theme
  - Adds DiscoGreen, DiscoBlue, DiscoRed and DiscoGold
  - Cycles all six themes from the Settings panel
  - Applies the selected theme to panels, borders, buttons, rows, search input and favorite sparkles
  - Adds a smaller Companion App QR code directly inside the Settings Companion section
  - Reuses the existing Companion QR data used by the Queue Companion dashboard
  - Keeps the full Companion dashboard available from Queue
  - Adds compact Companion status and connected device count in Settings
  - Does not add new reflection or new Companion lookup logic
  - Settings Companion status now uses the same emoji icon/text/color style as Queue
  - Removes the separate Settings-only yellow dot
  - Builds on v1.4.6.10 Settings Companion Yellow Status Dot

authors:
  - Jimmy Berglund

requiredTypes:
  - System.Reflection.MethodInfo
  - System.Reflection.BindingFlags
  - System.Reflection.PropertyInfo
  - System.Reflection.ParameterInfo
  - System.Security.Cryptography.MD5
  - System.Text.Encoding
