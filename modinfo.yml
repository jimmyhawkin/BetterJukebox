name: Better Jukebox
version: 2.0.0.24
description : |
  BetterJukebox v2.0.0.24 - History and Next Hold Threshold

  - Replaces the temporary Song Select lobby design
  - Uses BetterJukebox's existing overlay button builders and theme styling
  - Shows only Next, Search, Queue, History and Settings in Jukebox Song Select
  - Opens the real BetterJukebox Search, Queue, History and Settings panels
  - Next starts the first native queued song when available
  - Random song selection is used only when the native queue is empty
  - Song Select Jukebox menu remains permanently visible
  - Menu appears only after entering through Jukebox
  - Entering through Sing never creates BetterJukebox UI or automation
  - Auto Play on Jukebox entry also prioritizes the native queue
  - Auto Continue prioritizes the native queue before random fallback
  - Native SongQueueManager remains the single queue owner
  - Routine diagnostic logging is disabled by default
  - Debug Logging can be enabled from BetterJukebox Settings
  - History hold and History panel Go Live use one shared Queue-first / Random-fallback path

authors:
  - Jimmy Berglund

requiredTypes:
  - System.Reflection.MethodInfo
  - System.Reflection.BindingFlags
  - System.Reflection.PropertyInfo
  - System.Reflection.FieldInfo
